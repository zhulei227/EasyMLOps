#1.第一次发送tool和simple_describe给llm,获取tools列表
#2.第二次发送tool+出入参详情给llm,获取单个tool+param
#3.如果param格式有误,在找llm做一次修正

woe_encoding:
  class: WOEEncoding
  can_use_time: 1
  require_label: True
  simple_describe: 将离散型特征转换为woe编码的数值型特征,unique_rate>0.5不建议使用
  describe: f"""woe encoding的tool,将离散型特征转换为数值型特征,unique_rate>0.5不建议使用,入参默认值及其解释,见parameters,你需要返回如{}这样的参数形式"""
  parameters_template: '{"cols":"all"} or {"cols":["col1","col2"]}'
  parameters:
    type: object
    properties:
      cols:
        default: all
        type: [ str,list ]
        describe: 默认取值为"all",表示对所有可操作的特征进行操作,也可通过list,比如["col1","col2"]对指定特征进行操作
    required: [ "cols" ]
target_encoding:
  class: TargetEncoding
  can_use_time: 1
  require_label: True
  simple_describe: 将离散型特征转换为target编码的数值型特征,unique_rate>0.5不建议使用
  describe: f"""target encoding的tool,将离散型特征转换为数值型特征,unique_rate>0.5不建议使用,入参默认值及其解释,见parameters,你需要返回如{}这样的参数形式"""
  parameters_template: '{"cols":"all"} or {"cols":["col1","col2"]}'
  parameters:
    type: object
    properties:
      cols:
        default: all
        type: [ str,list ]
        describe: 默认取值为"all",表示对所有可操作的变量进行操作,也可通过list,比如["col1","col2"]对指定特征进行操作
    required: [ "cols" ]
normalizer:
  class: Normalizer
  can_use_time: 1
  simple_describe: 对数值型特征进行归一化处理:(x-mean)/std
  describe: f"""对数值型特征的归一化工具,(x-mean)/std,将特征约束到一个0附近的取值空间,入参默认值及其解释,见parameters,你需要返回如{}这样的参数形式"""
  parameters_template: '{"cols":"all"} or {"cols":["col1","col2"]}'
  parameters:
    type: object
    properties:
      cols:
        default: all
        type: [ str,list ]
        describe: 默认取值为"all",表示对所有可操作的变量进行操作,也可通过list,比如["col1","col2"]对指定特征进行操作
    required: [ "cols" ]
bins:
  class: Bins
  can_use_time: 1
  simple_describe: 对数值型特征进行分箱,避免离群点影响,unique_rate>0.5的数值特征建议使用
  describe: f"""对数值型特征进行分箱操作,分箱特征有利于提升模型的鲁棒性,但精度通常会有下降,unique_rate>0.5的数值特征建议使用,入参默认值及其解释,见parameters,你需要返回如{}这样的参数形式"""
  default_parameters: { "prefix": "bins_" }
  parameters_template: '{"cols":"all","n_bins":10,"strategy":"quantile"} or {"cols":["col1","col2"],"n_bins":10,"strategy":"quantile"}'
  parameters:
    type: object
    properties:
      cols:
        default: all
        type: [ str,list ]
        describe: 默认取值为"all",表示对所有可操作的变量进行操作,也可通过list,比如["col1","col2"]对指定特征进行操作
      n_bins:
        default: 10
        type: int
        describe: 分箱数
      strategy:
        default: quantile
        type: str
        enum: [ quantile,uniform,kmeans ]
        describe: 分箱策略,uniform/quantile/kmeans分别表示等距/等位/kmeans聚类分箱
    required: [ "cols","strategy" ]
drop_cols:
  class: DropCols
  can_use_time: 1
  simple_describe: 删除特定的特征,比如std接近0,或者unique_rate接近1的特征
  describe: f"""删除特定的特征,通常是那些不适合入模的特征,比如std接近0,或者unique_rate接近1的特征,通常为一些取值相同或者id,时间类特征,入参默认值及其解释,见parameters,你需要返回如{}这样的参数形式"""
  parameters_template: '{"cols":["col1","col2"]}'
  default_parameters: { "cols": [ "n" ] }
  parameters:
    type: object
    properties:
      cols:
        default: None
        type: list
        describe: 删除特定的特征,比如["col1","col2"],表示删除col1和col2
    required: [ "cols" ]
